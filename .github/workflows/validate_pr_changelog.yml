name: Validate PR Changelog

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  validate:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check for changelog entries
        uses: actions/github-script@v9
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;

            // Define changelog sections to check (Keep a Changelog order)
            const sections = ['Added', 'Changed', 'Deprecated', 'Removed', 'Fixed'];
            let hasValidEntry = false;
            const foundEntries = [];

            for (const section of sections) {
              // Capture the section body: everything from the `### Section` header
              // up to (but not including) the next heading or the end of the body.
              // `[^\\n]*` tolerates header suffixes like "Deprecated / Future Warning".
              // This is intentionally forgiving — blank lines between the header and
              // the first bullet, or prose preceding the list, do not break validation.
              const pattern = new RegExp(`###\\s+${section}[^\\n]*\\n([\\s\\S]*?)(?=\\n#{1,6}\\s|$)`, 'i');
              const match = prBody.match(pattern);

              if (match) {
                // Count bullets that aren't HTML-comment placeholders from the template.
                const lines = match[1].split('\n').filter(line => {
                  const trimmed = line.trim();
                  return trimmed.startsWith('- ') && !trimmed.startsWith('- <!--');
                });

                if (lines.length > 0) {
                  hasValidEntry = true;
                  foundEntries.push(`${section}: ${lines.length} item(s)`);
                }
              }
            }

            if (!hasValidEntry) {
              const comment = `## ⚠️ Changelog Entry Required

            This pull request does not have any changelog entries. Please add at least one entry under the appropriate section(s) in the PR description:

            - **Added** - for new features
            - **Changed** - for changes in existing functionality
            - **Deprecated** - for APIs still present but scheduled for removal (must emit \`DeprecationWarning\` or \`FutureWarning\`)
            - **Removed** - for APIs that have now been removed (should reference the release in which they were deprecated)
            - **Fixed** - for bug fixes

            ### Example:
            \`\`\`markdown
            ### Fixed
            - Fixed memory leak in trajectory interpolation
            - Corrected EOP data loading for edge cases
            \`\`\`

            These entries will be aggregated into the CHANGELOG and GitHub Release notes at release time, attributed to you and this PR.`;

              // Find existing bot comments
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Changelog Entry Required')
              );

              if (botComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: comment,
                });
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: comment,
                });
              }

              core.setFailed('No changelog entries found in PR description');
            } else {
              console.log(`✅ Changelog validation passed`);
              console.log(`Found entries: ${foundEntries.join(', ')}`);

              // Optionally delete the warning comment if it exists
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Changelog Entry Required')
              );

              if (botComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                });
                console.log('Deleted previous warning comment');
              }
            }
