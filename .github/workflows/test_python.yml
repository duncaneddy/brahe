name: Test Python
on:
    workflow_call:
        inputs:
            is-fork-pr:
                description: 'Whether this is a fork PR (skip credential-dependent tests)'
                required: false
                type: boolean
                default: false
            python-versions:
                description: 'JSON array of Python versions to test'
                required: false
                type: string
                default: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
            coverage-python-version:
                description: 'Python version used for the coverage-instrumented build'
                required: false
                type: string
                default: '3.13'
jobs:
    test-python:
        runs-on: ${{ matrix.os }}
        environment: ${{ !inputs.is-fork-pr && 'release' || '' }}
        permissions:
            id-token: write
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                python-version: ${{ fromJSON(inputs.python-versions) }}
                rust-toolchain: [stable]
        env:
            TEST_SPACETRACK_USER: ${{ !inputs.is-fork-pr && secrets.TEST_SPACETRACK_USER || '' }}
            TEST_SPACETRACK_PASS: ${{ !inputs.is-fork-pr && secrets.TEST_SPACETRACK_PASS || '' }}
        steps:
            -   name: Set up Rust toolchain
                uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
                with:
                    toolchain: ${{ matrix.rust-toolchain }}
            -   name: Set default Rust toolchain
                run: |
                    rustup update ${{ matrix.rust-toolchain }}
                    rustup default ${{ matrix.rust-toolchain }}
            -   uses: actions/checkout@v6.0.3
            -   name: Install the latest version of uv
                uses: astral-sh/setup-uv@v8.2.0
                with:
                    enable-cache: true
            -   name: Install Python ${{ matrix.python-version }}
                run: uv python install ${{ matrix.python-version }}

            -   name: Install dependencies
                run: uv sync --group test --all-extras --frozen --python ${{ matrix.python-version }}

            # ── Coverage-instrumented build (ubuntu + coverage-python-version only) ──

            -   name: Install cargo-llvm-cov
                if: matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.coverage-python-version
                uses: taiki-e/install-action@cargo-llvm-cov

            -   name: Build, test, and generate coverage
                if: matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.coverage-python-version
                run: |
                    cargo llvm-cov clean --workspace
                    eval "$(cargo llvm-cov show-env --export-prefix)"
                    uv pip install maturin --quiet
                    uv run maturin develop --uv --features pyo3/extension-module
                    uv run --frozen pytest tests/ \
                        --cov=brahe \
                        --cov-report=xml:python-coverage.xml \
                        --cov-report=term \
                        -m '${{ inputs.is-fork-pr && 'not ci' || '' }}'
                    cargo llvm-cov report --lcov --output-path python-rust-coverage.lcov

            -   name: Build extension (standard)
                if: matrix.os != 'ubuntu-latest' || matrix.python-version != inputs.coverage-python-version
                run: uv pip install -e .

            -   name: Test with python ${{ matrix.python-version }}
                if: matrix.os != 'ubuntu-latest' || matrix.python-version != inputs.coverage-python-version
                run: uv run --frozen pytest tests/ -v -m '${{ inputs.is-fork-pr && 'not ci' || '' }}'

            -   name: Upload Python coverage to Codecov
                if: matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.coverage-python-version
                uses: codecov/codecov-action@v6.0.1
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: python-coverage.xml
                    flags: python
                    fail_ci_if_error: false
                    verbose: true
                    use_oidc: true

            -   name: Upload Python-Rust coverage to Codecov
                if: matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.coverage-python-version
                uses: codecov/codecov-action@v6.0.1
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: python-rust-coverage.lcov
                    flags: python-rust
                    fail_ci_if_error: false
                    verbose: true
                    use_oidc: true
