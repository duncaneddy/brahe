name: Test Rust
on:
    workflow_call:
        inputs:
            is-fork-pr:
                description: 'Whether this is a fork PR (skip credential-dependent tests)'
                required: false
                type: boolean
                default: false
jobs:
    test-rust:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                # os: [ubuntu-latest]
                os: [ubuntu-latest, macos-latest, windows-latest]
                rust-toolchain: [stable]
        environment: ${{ !inputs.is-fork-pr && 'release' || '' }}
        permissions:
            id-token: write
        env:
            CARGO_TERM_COLOR: always
            TEST_SPACETRACK_USER: ${{ !inputs.is-fork-pr && secrets.TEST_SPACETRACK_USER || '' }}
            TEST_SPACETRACK_PASS: ${{ !inputs.is-fork-pr && secrets.TEST_SPACETRACK_PASS || '' }}
            TEST_SPACETRACK_BASE_URL: https://for-testing-only.space-track.org
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Rust toolchain with cache
                uses: actions-rust-lang/setup-rust-toolchain@v1
                with:
                    toolchain: ${{ matrix.rust-toolchain }}
            -   name: Set default Rust toolchain
                run: |
                    rustup update ${{ matrix.rust-toolchain }}
                    rustup default ${{ matrix.rust-toolchain }}
            -   name: Install cargo-llvm-cov
                uses: taiki-e/install-action@cargo-llvm-cov
            -   name: Run Rust tests with coverage
                # Limit rust-unit coverage to the core `brahe` crate. The `brahe-py`
                # workspace member has no Rust unit tests (it's exercised by pytest),
                # so its coverage is measured in the python-rust combined flag below.
                run: cargo llvm-cov -p brahe --lcov --output-path lcov.info ${{ !inputs.is-fork-pr && '--features ci' || '' }}
            -   name: Upload coverage to Codecov
                if: matrix.os == 'ubuntu-latest'
                uses: codecov/codecov-action@v6.0.0
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: lcov.info
                    flags: rust-unit
                    fail_ci_if_error: false
                    verbose: true
                    use_oidc: true
                    
            -   name: Upload Brahe cache directory (Unix)
                if: runner.os != 'Windows'
                uses: actions/upload-artifact@v7
                with:
                    name: brahe-cache-${{ runner.os }}
                    path: ~/.cache/brahe/
                    retention-days: 1
                    if-no-files-found: ignore
            -   name: Upload Brahe cache directory (Windows)
                if: runner.os == 'Windows'
                uses: actions/upload-artifact@v7
                with:
                    name: brahe-cache-${{ runner.os }}
                    path: ~\\.cache\\brahe\\
                    retention-days: 1
                    if-no-files-found: ignore
    test-rust-docs:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                # os: [ubuntu-latest]
                os: [ubuntu-latest, macos-latest, windows-latest]
                rust-toolchain: [stable]
        steps:
            -   uses: actions/checkout@v6
            -   name: Set up Rust toolchain with cache
                uses: actions-rust-lang/setup-rust-toolchain@v1
                with:
                    toolchain: ${{ matrix.rust-toolchain }}
            -   name: Set default Rust toolchain
                run: |
                    rustup update ${{ matrix.rust-toolchain }}
                    rustup default ${{ matrix.rust-toolchain }}
            -   name: Run Rust doc tests
                run: cargo test --doc ${{ !inputs.is-fork-pr && '--features ci' || '' }} -- --test-threads=1
    