name: Test Examples

on:
  workflow_call:

jobs:
  test-examples:
    runs-on: ubuntu-latest
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain with cache
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install rust-script for Rust examples
        run: cargo install rust-script

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      # Try to download Brahe cache to avoid external API calls
      - name: Download Brahe cache directory
        id: download-cache
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: brahe-cache
          path: ~/.cache/brahe/

      # Copy test assets to cache for examples that might use them
      - name: Setup test assets in cache
        run: |
          mkdir -p ~/.cache/brahe/naif/
          if [ -f test_assets/de440s.bsp ]; then
            cp test_assets/de440s.bsp ~/.cache/brahe/naif/
            echo "Copied de440s.bsp test asset to cache"
          fi

      - name: Build Rust package
        run: cargo build

      - name: Build Python extension
        run: uv pip install -e .

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Test examples (including CI-ONLY)
        run: just test-examples --ci-only

      - name: Cache Natural Earth data
        uses: actions/cache@v5
        with:
          path: ~/.cache/brahe/natural_earth
          key: natural-earth-50m-land-v1

      - name: Generate documentation plots
        run: just make-plots

      - name: Upload figures as artifact
        uses: actions/upload-artifact@v7
        with:
          name: doc-figures
          path: docs/figures/
          retention-days: 1

      - name: Upload example outputs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: doc-outputs
          path: docs/outputs/
          retention-days: 1
