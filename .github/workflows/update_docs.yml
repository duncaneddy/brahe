# This workflow will run only if the only changes made are in the docs folder.
# This enables quick fixes to documentation to be deployed without running the entire test suite.

name: Update Docs

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to deploy (e.g., v0.1.0). If not provided, deploys as "latest"'
        required: false
        type: string
        default: ''

# Prevent concurrent gh-pages deployments
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for accurate git revision dates and mike versioning

      - name: Configure Git for mike
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Download figures artifact
        uses: actions/download-artifact@v8
        with:
          name: doc-figures
          path: docs/figures/

      - name: Download example outputs artifact
        uses: actions/download-artifact@v8
        with:
          name: doc-outputs
          path: docs/outputs/

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group docs --all-extras --frozen

      # Try to download Brahe cache to avoid external API calls
      - name: Download Brahe cache directory
        id: download-cache
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: brahe-cache
          path: ~/.cache/brahe/

      - name: Build Python extension
        run: uv pip install -e .

      - name: Generate type stubs
        run: ./scripts/generate_stubs.sh

      - name: Download CHANGELOG
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Copy CHANGELOG to docs
        run: cp CHANGELOG.md docs/changelog.md

      - name: Build documentation site
        run: uv run mkdocs build

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages:gh-pages || true

      - name: Deploy documentation (versioned release)
        if: inputs.version != ''
        run: uv run --frozen mike deploy --push --update-aliases ${{ inputs.version }} stable

      - name: Prune old doc versions (keep latest + 3 most recent minor versions)
        if: inputs.version != ''
        run: |
          # List all deployed versions from mike
          VERSIONS=$(uv run --frozen mike list 2>/dev/null | awk '{print $1}' | tr -d '[]')

          # Collect release versions (exclude "latest"), sort by semver descending
          RELEASE_VERSIONS=""
          for v in $VERSIONS; do
            if [ "$v" != "latest" ]; then
              RELEASE_VERSIONS="$RELEASE_VERSIONS $v"
            fi
          done

          # Sort versions by semver descending
          SORTED=$(echo $RELEASE_VERSIONS | tr ' ' '\n' | sed 's/^v//' | sort -t. -k1,1nr -k2,2nr -k3,3nr | sed 's/^/v/')

          # Group by minor version (major.minor), keep only the 3 most recent minor groups
          # For each version, the highest patch in each minor group is kept (first seen since sorted desc)
          KEEP_VERSIONS=""
          DELETE_VERSIONS=""
          SEEN_MINORS=""
          MINOR_COUNT=0
          for v in $SORTED; do
            # Extract major.minor (e.g., v1.1.4 -> 1.1)
            MINOR=$(echo "$v" | sed 's/^v//' | cut -d. -f1,2)
            if ! echo "$SEEN_MINORS" | grep -q "^${MINOR}$"; then
              # New minor version group
              MINOR_COUNT=$((MINOR_COUNT + 1))
              SEEN_MINORS=$(printf '%s\n%s' "$SEEN_MINORS" "$MINOR")
            fi
            if [ $MINOR_COUNT -le 3 ]; then
              KEEP_VERSIONS="$KEEP_VERSIONS $v"
            else
              DELETE_VERSIONS="$DELETE_VERSIONS $v"
            fi
          done

          if [ -n "$DELETE_VERSIONS" ]; then
            echo "Keeping versions:$KEEP_VERSIONS"
            echo "Pruning old doc versions:$DELETE_VERSIONS"
            uv run --frozen mike delete --push $DELETE_VERSIONS
          else
            echo "No old versions to prune (all within 3 most recent minor versions)"
          fi

      - name: Set default version redirect (versioned release)
        if: inputs.version != ''
        run: uv run --frozen mike set-default --push latest

      - name: Deploy documentation (latest from main)
        if: inputs.version == ''
        run: uv run --frozen mike deploy --push --update-aliases latest

      - name: Set default version redirect (latest)
        if: inputs.version == ''
        run: uv run --frozen mike set-default --push latest