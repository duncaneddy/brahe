# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      # rand_distr 0.6 needs rand 0.10, but polars and rv keep the tree on
      # rand 0.9 / rand_distr 0.5; bumping any of these duplicates the crates
      # and drops StdRng: Clone. Revisit once polars and rv adopt rand 0.10.
      - dependency-name: "rand"
      - dependency-name: "rand_distr"
      - dependency-name: "rv"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

