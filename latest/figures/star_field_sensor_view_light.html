    var h = document.body && document.body.scrollHeight;
    if (!h) {
      return;
    }
    window.parent.postMessage(
      { type: 'brahe-fig-height', height: h },
      '*'
    );
  }
  if (document.readyState === 'complete') {
    setTimeout(report, 0);
  } else {
    window.addEventListener('load', function () { setTimeout(report, 0); });
  }
})();
</script>
