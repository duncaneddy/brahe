name: Update Bundled Data

on:
  schedule:
    - cron: '0 2 */3 * *'  # Every 3 days at 2 AM UTC
  workflow_dispatch:

jobs:
  update-eop-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        # WORKFLOW_TOKEN allows pushing to main even when branch protection
        # requires a PR for ordinary contributors.
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Refresh bundled EOP and space weather data
        run: ./scripts/update-data.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Restrict to the data we manage to avoid accidentally pushing other
          # working-tree changes.
          git add data/eop data/space_weather
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update bundled EOP and space weather data"
          git push origin HEAD:main
