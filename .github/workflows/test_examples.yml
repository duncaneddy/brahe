name: Test Examples

on:
  workflow_call:
    inputs:
      example_args:
        description: "Arguments passed to `just test-examples` (e.g. --ci-only, --ignore)."
        type: string
        default: "--ci-only"
      use_retry:
        description: >-
          Wrap the example run in a retry loop. Use for live-network runs
          (e.g. --ignore) where third-party services may throttle or blip.
          Also skips doc-plot generation, which is only needed on the PR path.
        type: boolean
        default: false

jobs:
  test-examples:
    runs-on: ubuntu-latest
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Rust toolchain with cache
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install rust-script for Rust examples
        run: cargo install rust-script

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      # Try to download Brahe cache to avoid external API calls
      - name: Download Brahe cache directory
        id: download-cache
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: brahe-cache
          path: ~/.cache/brahe/

      # Restored before "Setup test assets in cache" below so the repo's
      # test_assets/de440s.bsp always wins over a stale cached copy; only
      # moon_pa_de440/mar099s (not provided as test assets) are served from
      # this cache, which is why it can't sit with the other cache steps.
      - name: Cache NAIF kernels
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/brahe/naif
          key: naif-kernels-v1

      # Copy test assets to cache for examples that might use them
      - name: Setup test assets in cache
        run: |
          mkdir -p ~/.cache/brahe/naif/
          if [ -f test_assets/de440s.bsp ]; then
            cp test_assets/de440s.bsp ~/.cache/brahe/naif/
            echo "Copied de440s.bsp test asset to cache"
          fi

      - name: Build Rust package
        run: cargo build

      - name: Build Python extension
        run: uv pip install -e .

      - name: Install just
        uses: extractions/setup-just@v4

      # Persist the network resources the examples/plots need so they are never
      # downloaded (or raced) live in the parallel pools below. Restored before
      # the warm-up step; GitHub evicts caches by last access, so each restore
      # (a hit) resets the 7-day eviction window and keeps the shared main-branch
      # caches alive. A miss re-populates them via the warm-up step's post-save.
      - name: Cache Natural Earth 3D textures
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/brahe/textures
          key: natural-earth-textures-50m-v1

      - name: Cache Natural Earth land basemap
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/brahe/natural_earth
          key: natural-earth-50m-land-v1

      - name: Cache cartopy Natural Earth data
        uses: actions/cache@v6.1.0
        with:
          path: ~/.local/share/cartopy
          key: cartopy-natural-earth-v1

      # Serial, retrying download of all plot/example network resources. On a
      # cache hit this is an instant no-op; on a miss it warms the caches once so
      # the parallel pools below never hit the network.
      - name: Pre-download plot/example resources
        run: just download-resources

      - name: Test examples
        if: ${{ !inputs.use_retry }}
        run: just test-examples ${{ inputs.example_args }}

      # Live-network runs (e.g. --ignore, which exercises the ICGEM/Celestrak/
      # GCAT/NAIF dataset examples) retry to absorb transient remote throttling.
      - name: Test examples (with retries)
        if: ${{ inputs.use_retry }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 60
          command: just test-examples ${{ inputs.example_args }}

      - name: Generate documentation plots
        if: ${{ !inputs.use_retry }}
        run: just make-plots

      - name: Upload figures as artifact
        if: ${{ !inputs.use_retry }}
        uses: actions/upload-artifact@v7
        with:
          name: doc-figures
          path: docs/figures/
          # Keep long enough that re-running the deploy job a day or two later
          # (e.g. after CI throttling/retries) still finds the artifact.
          retention-days: 7

      - name: Upload example outputs as artifact
        if: ${{ !inputs.use_retry }}
        uses: actions/upload-artifact@v7
        with:
          name: doc-outputs
          path: docs/outputs/
          retention-days: 7
