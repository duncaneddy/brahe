name: Unit Tests

on:
    push:
        branches:
            - main
        # Only run if source/test files changed
        paths:
            - 'examples/**'
            - 'plots/**'
            - 'brahe/**'
            - 'src/**'
            - 'tests/**'
            - 'test_assets/**'
            - 'data/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'pyproject.toml'
            - 'uv.lock'
            - '.github/workflows/unit_tests.yml'
            - '.github/workflows/test_*.yml'
            - '.github/workflows/build_latest.yml'
            - '.github/workflows/release.yml'
    # Allow manual runs to re-validate main and re-trigger the downstream
    # "Build Latest Wheels" workflow (via workflow_run) on demand.
    workflow_dispatch:

concurrency:
    group: unit-tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-rust:
        uses: ./.github/workflows/test_rust.yml
        secrets: inherit
    delay-python:
        runs-on: ubuntu-latest
        steps:
            - name: Wait for Rust tests to claim runners
              run: sleep 15
    test-python:
        needs: [delay-python]
        uses: ./.github/workflows/test_python.yml
        secrets: inherit
    test-examples:
        # needs: [ test-rust ] # Remove this dependency for optimistic parallel execution
        uses: ./.github/workflows/test_examples.yml
    update-docs:
        needs: [ test-rust, test-python, test-examples ]
        uses: ./.github/workflows/update_docs.yml