name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'profiles/**'

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        run: |
          echo "should_skip=false" >> $GITHUB_OUTPUT

  test-rust:
    needs: [check-skip]
    if: needs.check-skip.outputs.should_skip == 'false'
    uses: ./.github/workflows/test_rust.yml
    secrets: inherit

  delay-python:
    needs: [check-skip]
    if: needs.check-skip.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Rust tests to claim runners
        run: sleep 15

  test-python:
    needs: [delay-python]
    if: needs.delay-python.result == 'success'
    uses: ./.github/workflows/test_python.yml
    with:
      # PR runs test only the oldest supported Python (the declared floor in pyproject.toml)
      # across all 3 OSes to catch breakage of the minimum-supported version.
      # The full matrix runs on push to main.
      python-versions: '["3.10"]'
      coverage-python-version: '3.10'
    secrets: inherit

  test-examples:
    needs: [check-skip]
    if: needs.check-skip.outputs.should_skip == 'false'
    uses: ./.github/workflows/test_examples.yml

  # Validate crates.io package builds correctly and is under size limit
  validate-rust-package:
    runs-on: ubuntu-latest
    needs: [check-skip, test-rust]
    if: needs.check-skip.outputs.should_skip == 'false'
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build and validate Rust package
        run: just build --lang rust

  # Validate PyPI packages build correctly with proper metadata
  validate-python-package:
    runs-on: ubuntu-latest
    needs: [check-skip, test-python]
    if: needs.check-skip.outputs.should_skip == 'false'
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build and validate Python package
        run: just build --lang python

  # Build docs to verify no breakage, but don't deploy
  build-docs:
    runs-on: ubuntu-latest
    needs: [check-skip, test-rust, test-python, test-examples]
    if: needs.check-skip.outputs.should_skip == 'false'
    env:
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Set default Rust toolchain
        run: |
          rustup update ${{ env.RUST_TOOLCHAIN }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group docs --all-extras --frozen

      - name: Build Python extension
        run: uv pip install -e ".[plots]"

      - name: Generate type stubs
        run: ./scripts/generate_stubs.sh

      # Download artifacts from test-examples
      - name: Download test-examples artifacts
        uses: actions/download-artifact@v8
        with:
          name: doc-figures
          path: docs/figures/

      - name: Build documentation (verify only, no deployment)
        run: uv run properdocs build

  # Single aggregation check to require in branch protection. Matrix job names
  # (e.g. "test-rust (ubuntu-latest, stable)") are brittle to reference directly,
  # so require only this job: it fails if any upstream job failed or was cancelled.
  # `skipped` is tolerated so path-filtered/conditional jobs don't wedge merges.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test-rust
      - test-python
      - test-examples
      - validate-rust-package
      - validate-python-package
      - build-docs
    steps:
      - name: Verify all required jobs passed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "Upstream job results: $results"
          for r in $results; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::A required job did not pass (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed."
